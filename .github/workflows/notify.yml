name: Notify New Events

on:
  push:
    branches: [main]

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (with history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract commit message
        id: msg
        env:
          PASSWORD: ${{ secrets.CALENDAR_PASSWORD }}
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "full<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Parse NOTIFY block
        id: parse
        run: |
          MSG=$(git log -1 --pretty=%B)

          NOTIFY=$(echo "$MSG" | grep -E '^NOTIFY\s*=' | sed 's/.*=\s*//I' | tr '[:lower:]' '[:upper:]')

          if [ "$NOTIFY" != "TRUE" ]; then
            echo "send=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          TITLE=$(echo "$MSG" | grep -E '^TITLE\s*=' | sed 's/.*=\s*//')

          BODY=$(echo "$MSG" | awk '
            BEGIN {capture=0}
            /^BODY\s*=/ {capture=1; sub(/^BODY\s*=\s*/, ""); print; next}
            capture==1 {print}
          ')

          echo "send=true" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email
        if: steps.parse.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.parse.outputs.title }}
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: "Eick Group Calendar <${{ secrets.GMAIL_USER }}>"
          reply_to: "${{ secrets.GMAIL_USER }}"
          
          body: |
            Dear colleagues,

            ${{ steps.parse.outputs.body }}

            You can view the complete research calendar here: https://osferay.github.io/ResearchCalendar/

            Kind Regards,
            Óscar.